<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mic Assignment</title>
  <style>
    :root {
      --bg: #06090f;
      --panel: #0f141c;
      --text: #f5f7fa;
      --accent: #8ed8ff;
      --muted: rgba(255,255,255,0.72);
      --line: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(0,130,255,0.16), transparent 35%),
        linear-gradient(180deg, #07101a 0%, #04070c 100%);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .top-section {
      flex-shrink: 0;
      padding: 18px 24px 0;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      padding-bottom: 10px;
    }

    .header-left {
      min-width: 0;
    }

    .header-title {
      font-size: clamp(1.8rem, 3.5vw, 3rem);
      margin: 0;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-right {
      flex-shrink: 0;
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 7px;
      align-items: flex-end;
    }

    #lastUpdated {
      color: #b7c3cf;
      font-size: 0.85rem;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #scheduledEngineer {
      color: white;
      font-weight: 800;
      font-size: 1.05rem;
      white-space: nowrap;
    }

    .toggle-wrapper {
      margin-top: 2px;
    }

    #toggleIframeBtn {
      background: rgba(255,255,255,0.07);
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      transition: background-color 0.2s, border-color 0.2s;
    }

    #toggleIframeBtn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      margin: 14px 0 12px;
    }

    .iframe-wrapper {
      display: none;
      position: relative;
      height: 143px;
      margin: 0 0 12px;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.28);
    }

    .companion-iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 260px;
      transform: scale(0.55);
      transform-origin: top center;
      border: none;
    }

    .board-shell {
      flex: 1;
      min-height: 0;
      margin: 0 24px 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
        rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 20px 60px rgba(0,0,0,0.45);
      padding: 12px;
      overflow: hidden;
      display: flex;
    }

    .mic-container {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(120px, 1fr);
      gap: 2px;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
    }

    .mic-card {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-left: 1px solid rgba(255,255,255,0.04);
      border-right: 1px solid rgba(0,0,0,0.45);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.12)),
        var(--panel);
    }

    .mic-card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.06) 22%, rgba(0,0,0,0.2) 70%, rgba(0,0,0,0.6) 100%);
    }

    .mic-card.has-photo {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .mic-card.no-photo {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
        linear-gradient(180deg, #49525f 0%, #313947 100%);
    }

    .mic-card.backup {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        linear-gradient(180deg, #8fdcff 0%, #71c9f2 100%);
    }

    .mic-card.backup::before {
      background:
        linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.04) 35%, rgba(0,0,0,0.22) 100%);
    }

    .mic-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .mic-top {
      text-align: center;
      padding: 12px 8px 0;
    }

    .mic-number {
      margin: 0;
      font-size: clamp(1rem, 1.25vw, 1.5rem);
      font-style: italic;
      font-weight: 900;
      color: rgba(255,255,255,0.98);
      letter-spacing: 0.05em;
      text-shadow:
        0 2px 8px rgba(0,0,0,0.45),
        0 4px 18px rgba(0,0,0,0.55);
    }

    .mic-middle {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px 10px 24px;
    }

    .name-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .mic-name {
      margin: 0;
      font-size: clamp(1.35rem, 2.1vw, 2.45rem);
      font-weight: 900;
      line-height: 1.04;
      color: #fff;
      text-shadow:
        0 4px 12px rgba(0,0,0,0.5),
        0 8px 28px rgba(0,0,0,0.65);
      overflow-wrap: break-word;
    }

    .meta-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .meta-line {
      margin: 0;
      font-size: clamp(0.95rem, 1.2vw, 1.25rem);
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
      color: #fff;
      text-shadow:
        0 2px 6px rgba(0,0,0,0.5),
        0 4px 14px rgba(0,0,0,0.6);
    }

    .meta-label {
      color: var(--accent);
      margin-right: 6px;
      font-weight: 900;
    }

    .mic-card.backup .mic-number,
    .mic-card.backup .mic-name,
    .mic-card.backup .meta-line,
    .mic-card.backup .meta-label {
      color: #fff;
    }

    .empty-name {
      opacity: 0.58;
    }

    @media (max-width: 900px) {
      html, body {
        overflow: auto;
      }

      .top-section {
        padding: 16px 16px 0;
      }

      .header-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .header-right {
        text-align: left;
        align-items: flex-start;
      }

      .board-shell {
        margin: 0 16px 16px;
        min-height: 60vh;
      }

      .mic-container {
        grid-auto-columns: minmax(95px, 1fr);
      }

      .mic-name {
        font-size: clamp(1.05rem, 3.2vw, 1.6rem);
      }

      .meta-line {
        font-size: clamp(0.8rem, 2.2vw, 1rem);
      }
    }

    @media (max-width: 640px) {
      .header-title {
        font-size: 1.5rem;
      }

      .tagline {
        font-size: 0.8rem;
      }

      .board-shell {
        min-height: 55vh;
      }

      .mic-container {
        grid-auto-columns: minmax(84px, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="top-section">
    <div class="header-row">
      <div class="header-left">
        <h1 class="header-title">Microphone Assignments for April 6th</h1>
        <div class="tagline">Remember to check your microphone and pack batteries</div>
      </div>

      <div class="header-right">
        <span id="lastUpdated">Last Updated: --:--</span>
        <span id="scheduledEngineer">Scheduled Audio Engineer: --</span>
      </div>
    </div>


    <div class="divider"></div>
  </div>

  <div class="board-shell">
    <div class="mic-container" id="micBoard"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import { getFirestore, getDoc, getDocs, collection, onSnapshot, doc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBvx4480OFZ1hSkgLsqe4KO7bAWny-kG_U",
      authDomain: "micassignments.firebaseapp.com",
      projectId: "micassignments",
      storageBucket: "micassignments.appspot.com",
      messagingSenderId: "1010248680745",
      appId: "1:1010248680745:web:b82c69767cc857269c2338"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const titleEl = document.querySelector(".header-title");
    const taglineEl = document.querySelector(".tagline");
    const engineerEl = document.getElementById("scheduledEngineer");
    const micBoard = document.getElementById("micBoard");
    const lastUpdated = document.getElementById("lastUpdated");

    function escapeHtml(str = '') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    onSnapshot(doc(db, "uiSettings", "main"), (docSnap) => {
      const data = docSnap.data();
      if (data) {
        if (data.title) titleEl.textContent = data.title;
        if (data.tagline) taglineEl.textContent = ` ${data.tagline}`;
        if (data.engineer) engineerEl.textContent = `Scheduled Audio Engineer: ${data.engineer}`;
      }
    });

    const docOrder = ["one", "two", "three", "four", "five", "six", "seven", "eight", "nine"];
    let cachedPhotos = {};

    async function loadImages() {
      const snapshot = await getDocs(collection(db, "images"));
      snapshot.forEach(doc => {
        const data = doc.data();
        cachedPhotos[data.name] = data.photoURL;
      });
    }

    loadImages().then(() => {
      docOrder.forEach(docId => {
        const micRef = doc(db, "micAssignments", docId);
        onSnapshot(micRef, (docSnap) => {
          const data = docSnap.data();
          const existingCard = document.getElementById(`card-${docId}`);
          if (existingCard) existingCard.remove();

          if (!data || data.name === "No One") return;

          const micCard = document.createElement("div");
          const photoUrl = cachedPhotos[data.name] || '';
          const hasPhoto = !!photoUrl;

          const lowerName = (data.name || '').toLowerCase();
          const lowerPosition = (data.position || '').toLowerCase();
          const isBackup =
            lowerName.includes('backup') ||
            lowerName.includes('announcement') ||
            lowerPosition.includes('backup') ||
            lowerPosition.includes('announcement');

          micCard.classList.add("mic-card");
          if (hasPhoto) micCard.classList.add("has-photo");
          else micCard.classList.add("no-photo");
          if (isBackup) micCard.classList.add("backup");
          micCard.id = `card-${docId}`;

          if (hasPhoto) {
            micCard.style.backgroundImage = `url("${photoUrl}")`;
          }

          micCard.innerHTML = `
            <div class="mic-inner">
              <div class="mic-top">
                <p class="mic-number">${escapeHtml(data.micNumber ? `Mic ${data.micNumber}` : 'Mic')}</p>
              </div>

              <div class="mic-middle">
                <div class="name-stack">
                  <h3 class="mic-name ${data.name ? '' : 'empty-name'}">${escapeHtml(data.name || 'Unassigned')}</h3>

                  ${(data.inEarPack || data.position) ? `
                    <div class="meta-stack">
                      ${data.inEarPack ? `<p class="meta-line"><span class="meta-label">In Ear Pack:</span>${escapeHtml(data.inEarPack)}</p>` : ''}
                      ${data.position ? `<p class="meta-line"><span class="meta-label">Position:</span>${escapeHtml(data.position)}</p>` : ''}
                    </div>
                  ` : ''}
                </div>
              </div>
            </div>
          `;

          micBoard.appendChild(micCard);

          const now = new Date();
          const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          lastUpdated.textContent = `Last Updated: ${timeString}`;
        });
      });
    });

    window.addEventListener('DOMContentLoaded', () => {
      const toggleBtn = document.getElementById("toggleIframeBtn");
      const wrapper = document.getElementById("iframeWrapper");

      const savedState = localStorage.getItem("showBatteryLevels");
      if (savedState === "true") {
        wrapper.style.display = "block";
        toggleBtn.textContent = "Hide Battery Levels";
      }

      toggleBtn.addEventListener("click", () => {
        const showing = wrapper.style.display === "block";
        wrapper.style.display = showing ? "none" : "block";
        toggleBtn.textContent = showing ? "Show Battery Levels" : "Hide Battery Levels";
        localStorage.setItem("showBatteryLevels", !showing);
      });
    });
  </script>
  <script>
    setTimeout(() => {
      location.reload();
    }, 7200000);
  </script>
</body>
</html>
